<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />
    <title>CMS Portal - BPM/REA StoryHub</title>
  </head>
  <body>
    <div id="app">
      <div id="app-loader" class="app-loader hidden">
        <div class="app-loader-card">
          <div class="app-loader-spinner"></div>
            <div id="app-loader-msg" class="app-loader-msg">Loading...</div>
        </div>
      </div>
      <div class="topbar">
        <div class="topbar-brand">NCBA</div>
        <div class="topbar-brand">BPM/REA StoryTelling Hub - CMS</div>
        <div class="topbar-right">
          <span class="topbar-tag" id="save-status">All Changes Saved</span>
          <button class="save-btn" id="main-save-btn" disabled onclick="pushChanges()">Publish</button>
          <button class="logout-btn">Sign out</button>
        </div>
      </div>
      <div class="main-layout">
        <nav class="sidebar">
          <span class="sidebar-label">Content</span>
          <div class="nav-item" id="nav-rea" onclick="fadeRerender(renderSection2)">REA Background</div>
          <div class="nav-item" id="nav-innov" onclick="fadeRerender(renderSection3)">Innovation Portfolio</div>
          <div class="nav-item" id="nav-hof" onclick="fadeRerender(renderSection4)">Hall of Fame</div>
          <div class="nav-item" id="nav-dyk" onclick="fadeRerender(renderSection5)">Did You Know Series</div>
          <span class="sidebar-label" style="margin-top: 8px">Tools</span>
          <!-- <div class="nav-item" id="nav-json">
            Preview
          </div> -->
        </nav>
        <main class="content" id="main-content"></main>
      </div>
    </div>
  </body>
  <script src="js/app.js"></script>
</html>
